services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gestao}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gestao123}
      POSTGRES_DB: ${POSTGRES_DB:-gestao_operacional}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gestao} -d ${POSTGRES_DB:-gestao_operacional}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        NODE_ENV: production
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://gestao:gestao123@postgres:5432/gestao_operacional?schema=public}
      APP_PORT: ${APP_PORT:-4000}
      NODE_ENV: ${NODE_ENV:-production}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
    ports:
      - "${BACKEND_PORT:-54000}:4000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        NODE_ENV: production
    restart: unless-stopped
    environment:
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://backend:4000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:54000}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@gestao.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin@123}
    ports:
      - "${FRONTEND_PORT:-53000}:3000"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
