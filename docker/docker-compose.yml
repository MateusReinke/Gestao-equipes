services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gestao}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gestao123}
      POSTGRES_DB: ${POSTGRES_DB:-gestao_escalas}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
      args:
        NODE_ENV: production
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://gestao:gestao123@postgres:5432/gestao_escalas?schema=public}
      APP_PORT: ${APP_PORT:-4000}
      NODE_ENV: ${NODE_ENV:-production}
      JWT_SECRET: ${JWT_SECRET:-change_me}
    ports:
      - "${BACKEND_PORT:-54000}:4000"
    depends_on:
      - postgres

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
      args:
        NODE_ENV: production
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - "${FRONTEND_PORT:-53000}:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
